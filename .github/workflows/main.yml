# GithHub Actions Workflow generated with Ghygen
# Original configuration: https://ghygen.hi-folks.dev?code=0555902844da5dd5163a69e93327a0aa
name: Laravel Git Hooks

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
      - develop
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '11.*'
            testbench: '9.*'
            pest: '^3.0'
            pest-plugin-laravel: '^3.0'
          - php: '8.3'
            laravel: '11.*'
            testbench: '9.*'
            pest: '^3.0'
            pest-plugin-laravel: '^3.0'
          - php: '8.4'
            laravel: '11.*'
            testbench: '9.*'
            pest: '^3.0'
            pest-plugin-laravel: '^3.0'
          - php: '8.5'
            laravel: '11.*'
            testbench: '9.*'
            pest: '^3.0'
            pest-plugin-laravel: '^3.0'
          - php: '8.2'
            laravel: '12.*'
            testbench: '10.*'
            pest: '^3.0'
            pest-plugin-laravel: '^3.1'
          - php: '8.3'
            laravel: '12.*'
            testbench: '10.*'
            pest: '^3.0'
            pest-plugin-laravel: '^3.1'
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            pest: '^3.0'
            pest-plugin-laravel: '^3.1'
          - php: '8.5'
            laravel: '12.*'
            testbench: '10.*'
            pest: '^3.0'
            pest-plugin-laravel: '^3.1'
          - php: '8.3'
            laravel: '13.*'
            testbench: '11.*'
            pest: '^4.4.1'
            pest-plugin-laravel: '^4.1'
          - php: '8.4'
            laravel: '13.*'
            testbench: '11.*'
            pest: '^4.4.1'
            pest-plugin-laravel: '^4.1'
          - php: '8.5'
            laravel: '13.*'
            testbench: '11.*'
            pest: '^4.4.1'
            pest-plugin-laravel: '^4.1'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install NPM packages
        run: npm ci --include=dev

      - name: Install PHP versions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.testbench }}-${{ matrix.pest }}-${{ matrix.pest-plugin-laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.testbench }}-${{ matrix.pest }}-${{ matrix.pest-plugin-laravel }}-

      - name: Install Laravel dependencies
        run: |
          composer require --dev "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "pestphp/pest:${{ matrix.pest }}" "pestphp/pest-plugin-laravel:${{ matrix.pest-plugin-laravel }}" --no-interaction --no-update
          composer update --prefer-dist --prefer-stable --no-interaction

      - name: Set up Git user
        run: |
          git config --global user.email "github-actions@example.com"
          git config --global user.name "GitHub Actions"

      # Code quality
      - name: Execute tests (Unit and Feature tests) via PestPHP
        shell: 'script -q -e -c "bash {0}"'
        # Set environment
        env:
          SESSION_DRIVER: array
          TTY: true
        run: vendor/bin/pest

      - name: Execute Code Sniffer via Laravel Pint
        run: vendor/bin/pint --test src config

      - name: Execute PHP Stan
        run: vendor/bin/phpstan

      - name: Execute Rector
        run: vendor/bin/rector --dry-run

      - name: Execute PHP Insights
        run: vendor/bin/phpinsights --disable-security-check --no-interaction
