# GithHub Actions Workflow generated with Ghygen
# Original configuration: https://ghygen.hi-folks.dev?code=0555902844da5dd5163a69e93327a0aa
name: Laravel Git Hooks

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
      - develop
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['11', '12', '13']
        exclude:
          - php: '8.2'
            laravel: '13'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install NPM packages
        run: npm ci --include=dev

      - name: Install PHP versions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Resolve matrix dependency versions
        id: matrix-versions
        shell: bash
        run: |
          case "${{ matrix.laravel }}" in
            11)
              echo "laravel_constraint=11.*" >> "$GITHUB_OUTPUT"
              echo "testbench_constraint=9.*" >> "$GITHUB_OUTPUT"
              echo "testbench_key=9" >> "$GITHUB_OUTPUT"
              echo "pest_constraint=^3.0" >> "$GITHUB_OUTPUT"
              echo "pest_key=3" >> "$GITHUB_OUTPUT"
              echo "plugin_constraint=^3.0" >> "$GITHUB_OUTPUT"
              echo "plugin_key=3" >> "$GITHUB_OUTPUT"
              ;;
            12)
              echo "laravel_constraint=12.*" >> "$GITHUB_OUTPUT"
              echo "testbench_constraint=10.*" >> "$GITHUB_OUTPUT"
              echo "testbench_key=10" >> "$GITHUB_OUTPUT"
              echo "pest_constraint=^3.0" >> "$GITHUB_OUTPUT"
              echo "pest_key=3" >> "$GITHUB_OUTPUT"
              echo "plugin_constraint=^3.1" >> "$GITHUB_OUTPUT"
              echo "plugin_key=3" >> "$GITHUB_OUTPUT"
              ;;
            13)
              echo "laravel_constraint=13.*" >> "$GITHUB_OUTPUT"
              echo "testbench_constraint=11.*" >> "$GITHUB_OUTPUT"
              echo "testbench_key=11" >> "$GITHUB_OUTPUT"
              echo "pest_constraint=^4.4.1" >> "$GITHUB_OUTPUT"
              echo "pest_key=4" >> "$GITHUB_OUTPUT"
              echo "plugin_constraint=^4.1" >> "$GITHUB_OUTPUT"
              echo "plugin_key=4" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-testbench${{ steps.matrix-versions.outputs.testbench_key }}-pest${{ steps.matrix-versions.outputs.pest_key }}-plugin${{ steps.matrix-versions.outputs.plugin_key }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-testbench${{ steps.matrix-versions.outputs.testbench_key }}-pest${{ steps.matrix-versions.outputs.pest_key }}-plugin${{ steps.matrix-versions.outputs.plugin_key }}-

      - name: Install Laravel dependencies
        run: |
          composer require --dev "laravel/framework:${{ steps.matrix-versions.outputs.laravel_constraint }}" "orchestra/testbench:${{ steps.matrix-versions.outputs.testbench_constraint }}" "pestphp/pest:${{ steps.matrix-versions.outputs.pest_constraint }}" "pestphp/pest-plugin-laravel:${{ steps.matrix-versions.outputs.plugin_constraint }}" --no-interaction --no-update
          composer update --prefer-dist --prefer-stable --no-interaction

      - name: Set up Git user
        run: |
          git config --global user.email "github-actions@example.com"
          git config --global user.name "GitHub Actions"

      # Code quality
      - name: Execute tests (Unit and Feature tests) via PestPHP
        shell: 'script -q -e -c "bash {0}"'
        # Set environment
        env:
          SESSION_DRIVER: array
          TTY: true
        run: vendor/bin/pest

      - name: Execute Code Sniffer via Laravel Pint
        run: vendor/bin/pint --test src config

      - name: Execute PHP Stan
        run: vendor/bin/phpstan

      - name: Execute Rector
        run: vendor/bin/rector --dry-run

      - name: Execute PHP Insights
        run: vendor/bin/phpinsights --disable-security-check --no-interaction
