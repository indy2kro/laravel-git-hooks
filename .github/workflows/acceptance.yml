name: Acceptance Tests

on:
  schedule:
    - cron: "0 6 * * 0" # Every Sunday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        node: ["18", "20", "22"]

    name: PHP ${{ matrix.php }} / Node ${{ matrix.node }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php }}-

      - name: Cache acceptance tool sandboxes
        uses: actions/cache@v5
        with:
          path: /tmp/laravel-git-hooks-acceptance
          key: ${{ runner.os }}-acceptance-php${{ matrix.php }}-node${{ matrix.node }}-${{ hashFiles('tests/Acceptance/**') }}
          restore-keys: |
            ${{ runner.os }}-acceptance-php${{ matrix.php }}-node${{ matrix.node }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Set up Git user
        run: |
          git config --global user.email "github-actions@example.com"
          git config --global user.name "GitHub Actions"

      - name: Run acceptance tests
        run: composer test:acceptance
